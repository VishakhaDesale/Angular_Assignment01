<aside class="sidebar" [class.sidebar--open]="isOpen()">
  <div class="sidebar__brand">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 250" width="22" height="22" class="sidebar__logo">
      <path fill="#DD0031" d="M125 30L31.9 63.2l14.2 123.1L125 230l78.9-43.7 14.2-123.1z" />
      <path fill="#C3002F" d="M125 30v22.2-.1V230l78.9-43.7 14.2-123.1L125 30z" />
      <path fill="#FFFFFF"
        d="M125 52.1L66.8 182.6h21.7l11.7-29.2h49.4l11.7 29.2h21.7L125 52.1zm17 83.3h-34l17-40.9 17 40.9z" />
    </svg>
    <span>Angular Insights</span>
  </div>

  <nav class="sidebar__nav">
    <p class="sidebar__section-label">Menu</p>
    @for (item of navItems; track item.route) {
    <a class="sidebar__link" [routerLink]="item.route" routerLinkActive="sidebar__link--active" (click)="onNavClick()">
      <i class="bi sidebar__icon" [class]="'bi ' + item.icon"></i>
      <span>{{ item.label }}</span>
    </a>
    }
  </nav>

  <div class="sidebar__footer">
    <i class="bi bi-box sidebar__footer-icon"></i>
    <div>
      <p class="sidebar__footer-label">Angular</p>
      <p class="sidebar__footer-version">v20.3.21</p>
    </div>
  </div>
</aside>
